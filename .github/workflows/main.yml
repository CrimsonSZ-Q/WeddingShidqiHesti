name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * 1,4' # Berjalan jam 9:00 AM UTC setiap Senin & Kamis
  workflow_dispatch: # Bisa dijalankan manual dari UI GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout repository agar bisa membaca file ping.js
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js 22 secara global di runner
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' # Opsional: mempercepat jalannya action berikutnya

      # Step 3: Install library Supabase secara lokal (menggunakan Node 22 yang aktif)
      - name: Install Supabase Client
        run: npm install @supabase/supabase-js

      # Step 4: Jalankan script menggunakan Node 22
      - name: Run Ping Script
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_SERVICE_ROLE_KEY }}
        run: node ping.js
