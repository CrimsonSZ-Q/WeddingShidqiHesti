name: Ping Supabase to Prevent Pausing

on:
  schedule:
    - cron: '0 9 * * 1,4' # Berjalan jam 9:00 AM UTC setiap Senin & Kamis
  workflow_dispatch: # Bisa dijalankan manual dari UI GitHub

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      # Menggunakan Node.js 22 langsung tanpa perlu checkout repository
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Langsung jalankan script dengan npx agar tidak perlu bikin package.json/install manual
      - name: Ping Supabase
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.NEXT_SERVICE_ROLE_KEY }}
        run: |
          npx -y @supabase/supabase-js node -e "
          (async () => {
            try {
              // Validasi awal sebelum hit Supabase
              if (!process.env.SUPABASE_URL || !process.env.SUPABASE_KEY) {
                throw new Error('Secret GitHub tidak terbaca! Periksa kembali Settings > Secrets di GitHub.');
              }

              const { createClient } = require('@supabase/supabase-js');
              const supabase = createClient(process.env.SUPABASE_URL, process.env.SUPABASE_KEY);
              
              const { data, error } = await supabase.from('rsvps').select('*').limit(1);
              
              if (error) throw error;
              console.log('Ping berhasil! Supabase tetap aktif.');
            } catch (err) {
              console.error('Error:', err.message);
              process.exit(1);
            }
          })();
          "
